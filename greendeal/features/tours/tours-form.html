<div class="modal fade" id="tourFormPanel" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg modal-fullscreen-md-down modal-dialog-centered gd-entity-modal-dialog">
                <div class="modal-content gd-entity-modal">
                    <div class="modal-header">
                        <h5 class="modal-title" id="tourFormTitle">Nuevo tour</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                    </div>
                    <form id="tourForm" class="panel-form">
                        <div class="modal-body">
                            <div class="gd-form-grid gd-form-grid--2">
                                <div class="gd-form-field gd-form-field--span-2">
                                    <label class="form-label" for="tourName">Nombre del tour</label>
                                    <input type="text" class="form-control" id="tourName" required>
                                </div>
                                <div class="gd-form-field gd-form-field--span-2">
                                    <label class="form-label" for="tourProviderId">Proveedor</label>
                                    <select class="form-select" id="tourProviderId" required>
                                        <option value="">Seleccione un proveedor</option>
                                    </select>
                                </div>
                                <div class="gd-form-field">
                                    <label class="form-label" for="tourLocation">Ubicación</label>
                                    <input type="text" class="form-control" id="tourLocation" required>
                                </div>
                                <div class="gd-form-field">
                                    <label class="form-label" for="tourPricePerPerson">Precio por persona (₡)</label>
                                    <input type="number" class="form-control" id="tourPricePerPerson" min="1" step="1" required>
                                </div>
                                <div class="gd-form-field gd-form-field--span-2">
                                    <label class="form-label" for="tourDescription">Descripción</label>
                                    <textarea class="form-control" id="tourDescription" rows="3" required></textarea>
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer gd-entity-modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-success gd-form-submit-btn">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
