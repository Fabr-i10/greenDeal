<div id="reportsView" class="view-panel hidden">
                            <div class="view-header reports-view-header mb-3">
                                <div>
                                    <h4 class="mb-1">Reportes mensuales</h4>
                                    <p class="text-muted mb-0">Consulta totales por mes o por rango de fechas</p>
                                </div>
                                <div id="reportFilterForm" class="report-filter-form">
                                    <div class="report-toolbar">
                                        <div class="report-mode-toggle btn-group btn-group-sm" role="group" aria-label="Tipo de reporte">
                                            <input type="radio" class="btn-check" name="reportMode" id="reportModeMonth" value="month" checked>
                                            <label class="btn btn-outline-success" for="reportModeMonth">Por mes</label>
                                            <input type="radio" class="btn-check" name="reportMode" id="reportModeRange" value="range">
                                            <label class="btn btn-outline-success" for="reportModeRange">Por rango</label>
                                        </div>
                                        <div id="reportMonthFilters" class="report-filter-fields">
                                            <div class="report-filter-field">
                                                <label class="form-label" for="reportYear">Año</label>
                                                <input type="number" class="form-control form-control-sm" id="reportYear" min="2020" max="2100">
                                            </div>
                                            <div class="report-filter-field">
                                                <label class="form-label" for="reportMonth">Mes</label>
                                                <select class="form-select form-select-sm" id="reportMonth">
                                                    <option value="1">Enero</option>
                                                    <option value="2">Febrero</option>
                                                    <option value="3">Marzo</option>
                                                    <option value="4">Abril</option>
                                                    <option value="5">Mayo</option>
                                                    <option value="6">Junio</option>
                                                    <option value="7">Julio</option>
                                                    <option value="8">Agosto</option>
                                                    <option value="9">Septiembre</option>
                                                    <option value="10">Octubre</option>
                                                    <option value="11">Noviembre</option>
                                                    <option value="12">Diciembre</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div id="reportRangeFilters" class="report-filter-fields hidden">
                                            <div class="report-filter-field">
                                                <label class="form-label" for="reportStartDate">Desde</label>
                                                <input type="date" class="form-control form-control-sm" id="reportStartDate">
                                            </div>
                                            <div class="report-filter-field">
                                                <label class="form-label" for="reportEndDate">Hasta</label>
                                                <input type="date" class="form-control form-control-sm" id="reportEndDate">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                                </div>

                            <div class="card dashboard-card">
