<div class="modal fade" id="providerFormPanel" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-fullscreen-sm-down modal-dialog-scrollable modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="providerFormTitle">Nuevo proveedor</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                    </div>
                    <form id="providerForm" class="panel-form">
                        <div class="modal-body">
                            <input type="hidden" id="providerId">
                            <div class="mb-3">
                                <label class="form-label">Nombre de la empresa</label>
                                <input type="text" class="form-control" id="providerCompanyName" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Cédula jurídica</label>
                                <input type="text" class="form-control" id="providerLegalId" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Teléfono</label>
                                <input type="tel" class="form-control" id="providerPhone" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Correo electrónico</label>
                                <input type="email" class="form-control" id="providerEmail" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Dirección</label>
                                <textarea class="form-control" id="providerAddress" rows="2" required></textarea>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-success">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
