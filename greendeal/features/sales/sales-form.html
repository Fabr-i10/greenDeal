<div class="modal fade" id="saleFormPanel" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg modal-fullscreen-sm-down modal-dialog-scrollable modal-dialog-centered">
                <div class="modal-content gd-entity-modal">
                    <div class="modal-header">
                        <h5 class="modal-title">Registrar venta</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                    </div>
                    <form id="saleForm" class="panel-form">
                        <div class="modal-body">
                            <div class="gd-form-grid gd-form-grid--2">
                                <div class="gd-form-field gd-form-field--span-2">
                                    <label class="form-label" for="saleTourId">Tour</label>
                                    <select class="form-select" id="saleTourId" required>
                                        <option value="">Seleccione un tour</option>
                                    </select>
                                </div>
                                <div class="gd-form-field">
                                    <label class="form-label" for="saleDate">Fecha de venta</label>
                                    <input type="date" class="form-control" id="saleDate" required>
                                </div>
                                <div class="gd-form-field">
                                    <label class="form-label" for="saleQuantityPeople">Cantidad de personas</label>
                                    <input type="number" class="form-control" id="saleQuantityPeople" min="1" step="1" value="1" required>
                                </div>
                            </div>

                            <div class="gd-form-preview">
                                <h6 class="gd-form-preview-title">Cálculo automático</h6>
                                <div class="gd-form-preview-grid">
                                    <div class="gd-form-preview-item">
                                        <small>Total venta</small>
                                        <strong id="previewTotalSale">₡0</strong>
                                    </div>
                                    <div class="gd-form-preview-item">
                                        <small>Comisión total (20%)</small>
                                        <strong id="previewCommissionTotal">₡0</strong>
                                    </div>
                                    <div class="gd-form-preview-item">
                                        <small>Comisión sin IVA</small>
                                        <strong id="previewCommissionWithoutVAT">₡0</strong>
                                    </div>
                                    <div class="gd-form-preview-item">
                                        <small>IVA incluido</small>
                                        <strong id="previewVatAmount">₡0</strong>
                                    </div>
                                </div>
                                <p class="gd-form-preview-note">
                                    La comisión del 20% ya incluye el 13% de IVA.
                                </p>
                            </div>
                        </div>
                        <div class="modal-footer gd-entity-modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-success gd-form-submit-btn">Registrar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
